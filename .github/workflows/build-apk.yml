name: Build EduFlow APK (TWA)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Start local HTTP server for assets
        run: |
          cd www
          python3 -m http.server 8080 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2
          curl -I http://localhost:8080/icons/icon-512x512.png

      - name: Generate twa-manifest.json
        run: |
          mkdir -p twa-build
          python3 - << 'PYEOF'
          import json, os

          manifest = {
              "packageId": "com.eduflow.app",
              "host": "script.google.com",
              "name": "EduFlow",
              "launcherName": "EduFlow",
              "display": "standalone",
              "orientation": "portrait",
              "themeColor": "#4F46E5",
              "navigationColor": "#000000",
              "navigationColorDark": "#000000",
              "navigationDividerColor": "#000000",
              "navigationDividerColorDark": "#000000",
              "backgroundColor": "#ffffff",
              "startUrl": "/macros/s/AKfycbwn_52M5pMF53wvo1NhL1REc7oYFaKCIjZDUNIsClqQYYasyBe9y6-S5pFoygnqtv2y/exec",
              "iconUrl": "http://localhost:8080/icons/icon-512x512.png",
              "maskableIconUrl": "http://localhost:8080/icons/icon-512x512.png",
              "appVersion": "1",
              "appVersionCode": 1,
              "signingKey": {"path": "../android.keystore", "alias": "eduflow"},
              "splashScreenFadeOutDuration": 300,
              "enableNotifications": False,
              "shortcuts": [],
              "generatorApp": "bubblewrap-cli",
              "webManifestUrl": "http://localhost:8080/manifest.json",
              "fallbackType": "customtabs",
              "features": {},
              "alphaDependencies": {"enabled": False},
              "enableSiteSettingsShortcut": True,
              "isChromeOSOnly": False,
              "isMetaQuest": False,
              "fullScopeUrl": "https://script.google.com/macros/s/AKfycbwn_52M5pMF53wvo1NhL1REc7oYFaKCIjZDUNIsClqQYYasyBe9y6-S5pFoygnqtv2y/exec",
              "minSdkVersion": 21,
              "fingerprints": []
          }

          with open("twa-build/twa-manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print("OK - twa-manifest.json generated")
          PYEOF

      - name: Generate Android project
        working-directory: twa-build
        run: bubblewrap update --skipPwaValidation

      - name: Stop local server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Generate keystore
        working-directory: twa-build
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias eduflow \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=EduFlow,OU=Dev,O=EduFlow,L=PAP,S=Ouest,C=HT" \
            -storepass android \
            -keypass android

      - name: Build APK
        working-directory: twa-build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=android.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=eduflow \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eduflow-release
          path: twa-build/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
