<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EduFlow" />
  <meta name="description" content="EduFlow - Application éducative" />

  <title>EduFlow</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <!-- ⚠️ REMPLACE CE STYLE PAR TON style.css EXISTANT -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { color: #4F46E5; font-size: 2rem; margin-bottom: 1rem; }
    p  { color: #666; }
  </style>
</head>
<body>

  <!-- ⚠️ REMPLACE CE CONTENU PAR TON HTML EXISTANT -->
  <div class="container">
    <h1>EduFlow</h1>
    <p>Application chargée avec succès.</p>
  </div>

  <!-- ⚠️ REMPLACE PAR TON app.js EXISTANT -->
  <!-- <script src="app.js"></script> -->

  <!-- Push Notifications -->
  <script src="/push.js"></script>

  <!-- Service Worker Registration — NE PAS TOUCHER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW error:', err));
      });
    }
  </script>

</body>
</html>
